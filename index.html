<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026WRO空き時間カレンダー</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap');

  :root {
    --surface: #ffffff;
    --border: #e4e2dc;
    --text: #1a1917;
    --text-muted: #8a8880;
    --available: #d4ede1;
    --available-border: #5ab585;
    --available-text: #1d6640;
    --booked: #e8e0f4;
    --booked-border: #9a7fd4;
    --booked-text: #3d2778;
    --accent: #2b5be0;
    --accent-light: #eef1fd;
    --danger: #c74b3a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #f0f7ff;
    color: var(--text);
    min-height: 100vh;
    transition: background .35s ease;
  }

  .app { max-width: 900px; margin: 0 auto; padding: 32px 16px 64px; }

  header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 40px; flex-wrap: wrap; gap: 12px; }
  .logo { font-family: 'DM Mono', monospace; font-size: 13px; letter-spacing: .12em; color: var(--text-muted); text-transform: uppercase; }
  h1 { font-size: 22px; font-weight: 500; letter-spacing: -.02em; }

  /* ===== LOADING ===== */
  .loading-bar {
    position: fixed; top: 0; left: 0; right: 0; height: 3px;
    background: var(--accent); z-index: 200;
    animation: loadingAnim 1s ease-in-out infinite;
    display: none;
  }
  .loading-bar.active { display: block; }
  @keyframes loadingAnim {
    0%   { transform: scaleX(0); transform-origin: left; }
    50%  { transform: scaleX(1); transform-origin: left; }
    51%  { transform: scaleX(1); transform-origin: right; }
    100% { transform: scaleX(0); transform-origin: right; }
  }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: #1a1917; color: #fff;
    padding: 10px 20px; border-radius: 20px;
    font-size: 13px; z-index: 300;
    transition: transform .3s ease, opacity .3s ease;
    opacity: 0; pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast.error { background: var(--danger); }

  /* ===== MODE BANNER ===== */
  .mode-banner {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px; border-radius: 10px;
    font-size: 13px; font-weight: 500;
    margin-bottom: 20px; transition: all .3s ease;
  }
  .mode-banner.edit   { background: #ffe9cc; color: #7a3e00; border: 1px solid #f5c98a; }
  .mode-banner.view   { background: #dbeeff; color: #0a3d72; border: 1px solid #93c5fd; }
  .mode-banner.booked { background: #ede8fb; color: #3b2070; border: 1px solid #c4b5f4; }

  /* ===== MODE TABS ===== */
  .mode-tabs { display: flex; gap: 4px; background: rgba(0,0,0,.08); border-radius: 10px; padding: 3px; width: fit-content; margin-bottom: 16px; }
  .mode-tab { padding: 7px 18px; border-radius: 8px; border: none; background: transparent; font-family: inherit; font-size: 13px; font-weight: 400; color: var(--text-muted); cursor: pointer; transition: all .2s; }
  .mode-tab.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,.1); }

  /* ===== ADMIN BADGE ===== */
  .admin-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; color: #7a3e00; background: #ffe9cc; border: 1px solid #f5c98a; border-radius: 20px; padding: 4px 12px; cursor: pointer; transition: background .15s; }
  .admin-badge:hover { background: #ffd9a8; }

  /* ===== CAL NAV ===== */
  .cal-nav { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
  .cal-nav h2 { font-size: 18px; font-weight: 500; min-width: 160px; }
  .nav-btn { width: 32px; height: 32px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--text-muted); transition: all .15s; }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ===== CALENDAR ===== */
  .calendar { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
  .cal-header { display: grid; grid-template-columns: repeat(7, 1fr); border-bottom: 1px solid var(--border); }
  .cal-dow { padding: 10px 0; text-align: center; font-size: 11px; font-weight: 500; letter-spacing: .06em; color: var(--text-muted); text-transform: uppercase; }
  .cal-body { display: grid; grid-template-columns: repeat(7, 1fr); }
  .cal-day { min-height: 80px; padding: 8px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); cursor: default; position: relative; transition: background .1s; }
  .cal-day:nth-child(7n) { border-right: none; }
  .cal-day.other-month .day-num { color: #ccc; }
  .cal-day.has-slots { background: #fffffe; }
  .cal-day.today .day-num { background: var(--accent); color: #fff; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }
  .cal-day.editable { cursor: pointer; }
  .cal-day.editable:hover { background: #fff3e0; }
  .cal-day.clickable-view { cursor: pointer; }
  .cal-day.clickable-view:hover { background: #e8f4ff; }
  .day-num { font-size: 13px; font-weight: 400; color: var(--text-muted); margin-bottom: 4px; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }

  /* ===== SLOT CHIPS ===== */
  .slot-chip { font-size: 10px; border-radius: 4px; padding: 2px 5px; margin-bottom: 2px; cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; transition: opacity .1s, transform .1s; }
  .slot-chip:hover { opacity: .8; transform: scale(1.02); }
  .slot-chip:active { transform: scale(.97); }
  .slot-chip.available { background: var(--available); border: 1px solid var(--available-border); color: var(--available-text); }
  .slot-chip.has-bookings { background: var(--booked); border: 1px solid var(--booked-border); color: var(--booked-text); }

  /* ===== LEGEND ===== */
  .legend { display: flex; gap: 20px; margin-top: 14px; font-size: 12px; color: var(--text-muted); }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }

  /* ===== MODALS ===== */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35); backdrop-filter: blur(3px); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
  .overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 18px; width: 100%; max-width: 460px; padding: 28px; box-shadow: 0 24px 64px rgba(0,0,0,.16); animation: slideUp .2s ease; max-height: 90vh; overflow-y: auto; }
  @keyframes slideUp { from { transform: translateY(14px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal h3 { font-size: 16px; font-weight: 500; margin-bottom: 20px; }
  .modal-date { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-muted); margin-bottom: 16px; }

  /* ===== EDIT MODAL ===== */
  .slot-list { list-style: none; margin-bottom: 16px; }
  .edit-slot-item { border-radius: 10px; margin-bottom: 8px; overflow: hidden; border: 1px solid var(--border); }
  .edit-slot-header { display: flex; align-items: center; gap: 8px; padding: 8px 10px; font-size: 13px; }
  .edit-slot-header.available { background: var(--available); color: var(--available-text); }
  .edit-slot-header.has-bookings { background: var(--booked); color: var(--booked-text); }
  .edit-slot-label { flex: 1; font-weight: 500; }
  .edit-slot-count { font-size: 11px; opacity: .8; }
  .slot-action-btn { border: none; border-radius: 5px; font-family: inherit; font-size: 11px; font-weight: 500; padding: 4px 9px; cursor: pointer; transition: opacity .15s, transform .1s; white-space: nowrap; }
  .slot-action-btn:hover { opacity: .8; }
  .slot-action-btn:active { transform: scale(.96); }
  .delete-slot-btn { background: #f0f0f0; color: #555; border: 1px solid #d8d8d8; }
  .delete-slot-btn:hover { background: #e4e4e4; }

  /* 予約者リスト（管理者） */
  .booking-entry-list { list-style: none; padding: 6px 10px 8px; background: #faf8ff; }
  .booking-entry { display: flex; align-items: flex-start; gap: 8px; padding: 6px 0; border-bottom: 1px solid #ede8fb; font-size: 12px; }
  .booking-entry:last-child { border-bottom: none; }
  .be-info { flex: 1; }
  .be-name { font-weight: 500; color: var(--booked-text); }
  .be-time { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .be-delete { background: none; border: none; cursor: pointer; color: var(--danger); opacity: .6; font-size: 14px; padding: 0 2px; transition: opacity .1s; }
  .be-delete:hover { opacity: 1; }

  /* ===== FORM ===== */
  .form-section { border-top: 1px solid var(--border); padding-top: 16px; margin-top: 4px; }
  .form-label { display: block; font-size: 11px; font-weight: 500; letter-spacing: .06em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 5px; margin-top: 12px; }
  .form-label:first-child { margin-top: 0; }
  .form-input { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; font-family: inherit; font-size: 13px; color: var(--text); background: #fafafa; outline: none; transition: border-color .15s; }
  .form-input:focus { border-color: var(--accent); }
  .form-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

  /* ===== VIEW DAY MODAL ===== */
  .slot-list-view { list-style: none; margin-bottom: 8px; }
  .view-slot-card { border: 1.5px solid var(--border); border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
  .view-slot-card-header { display: flex; align-items: center; gap: 10px; padding: 11px 14px; font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity .1s; }
  .view-slot-card-header.available { background: var(--available); border-bottom: 1.5px solid var(--available-border); color: var(--available-text); }
  .view-slot-card-header.has-bookings { background: var(--booked); border-bottom: 1.5px solid var(--booked-border); color: var(--booked-text); }
  .view-slot-card-header:hover { opacity: .85; }
  .vsc-label { flex: 1; }
  .vsc-status { font-size: 11px; opacity: .85; white-space: nowrap; }
  .view-booking-list { list-style: none; padding: 8px 12px 10px; background: #faf8ff; }
  .view-booking-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid #ede8fb; font-size: 12px; }
  .view-booking-row:last-child { border-bottom: none; }
  .vbr-info { flex: 1; }
  .vbr-name { font-weight: 500; color: var(--booked-text); }
  .vbr-time { color: var(--text-muted); font-size: 11px; margin-top: 1px; }
  .vbr-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .vbr-btn {
    border: none; border-radius: 5px; font-family: inherit;
    font-size: 10px; font-weight: 500; padding: 3px 8px;
    cursor: pointer; transition: opacity .15s; white-space: nowrap;
  }
  .vbr-btn:hover { opacity: .75; }
  .vbr-edit-btn { background: #e8f0fe; color: var(--accent); }
  .vbr-cancel-btn { background: #fde8e8; color: var(--danger); }

  /* ===== BOOKING FORM ===== */
  .booking-slot-info { background: var(--available); border-radius: 10px; padding: 12px 14px; margin-bottom: 16px; }
  .bsi-label { font-size: 11px; color: var(--available-text); margin-bottom: 3px; }
  .bsi-value { font-size: 15px; font-weight: 500; color: var(--available-text); }

  /* ===== BUTTONS ===== */
  .btn-row { display: flex; gap: 8px; margin-top: 20px; }
  .btn { flex: 1; padding: 10px; border-radius: 8px; border: none; font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #1d49c7; }
  .btn-secondary { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--text-muted); color: var(--text); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #a33a2b; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  /* ===== PASSWORD MODAL ===== */
  .pw-modal { text-align: center; }
  .pw-modal .lock-icon { font-size: 32px; margin-bottom: 12px; }
  .pw-modal h3 { margin-bottom: 6px; }
  .pw-modal p { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
  .pw-input { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-family: inherit; font-size: 14px; text-align: center; letter-spacing: .15em; color: var(--text); background: #fafafa; outline: none; transition: border-color .15s; }
  .pw-input:focus { border-color: var(--accent); }
  .pw-error { font-size: 12px; color: var(--danger); margin-top: 8px; min-height: 18px; }
  .pw-set-link { display: inline-block; margin-top: 14px; font-size: 11px; color: var(--text-muted); cursor: pointer; text-decoration: underline; text-underline-offset: 2px; }
  .pw-set-link:hover { color: var(--accent); }

  /* ===== BOOKED LIST ===== */
  .booked-list { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.05); }
  .booked-row { display: grid; grid-template-columns: 110px 1fr 90px 100px; gap: 10px; align-items: center; padding: 12px 20px; border-bottom: 1px solid var(--border); font-size: 13px; transition: background .1s; }
  .booked-row:last-child { border-bottom: none; }
  .booked-row:hover { background: #f5f0ff; }
  .br-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); }
  .br-slot { font-weight: 500; }
  .br-name { color: var(--booked-text); font-weight: 500; }
  .br-time { font-size: 11px; color: var(--text-muted); }
  .empty-state { text-align: center; padding: 48px; color: var(--text-muted); font-size: 14px; }

  /* ===== MOBILE LIST ===== */
  .mobile-list { display: none; }
  .mobile-day-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
  .mobile-day-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: #f5f9ff; border-bottom: 1px solid var(--border); cursor: pointer; }
  .mobile-day-header.edit-mode { background: #fff6ee; }
  .mobile-day-date { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--text); }
  .mobile-day-date.today { color: var(--accent); }
  .mobile-day-count { font-size: 11px; color: var(--text-muted); }
  .mobile-day-arrow { font-size: 14px; color: var(--text-muted); transition: transform .2s; }
  .mobile-day-arrow.open { transform: rotate(90deg); }
  .mobile-slot-list { list-style: none; padding: 8px 12px 10px; }
  .mobile-slot-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-radius: 8px; margin-bottom: 6px; font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity .1s; gap: 10px; }
  .mobile-slot-item:active { opacity: .75; }
  .mobile-slot-item.available { background: var(--available); color: var(--available-text); border: 1px solid var(--available-border); }
  .mobile-slot-item.has-bookings { background: var(--booked); color: var(--booked-text); border: 1px solid var(--booked-border); }
  .mobile-slot-label { flex: 1; }
  .mobile-slot-badge { font-size: 10px; font-weight: 500; opacity: .85; background: rgba(255,255,255,.5); border-radius: 10px; padding: 2px 7px; white-space: nowrap; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 640px) {
    .desktop-calendar { display: none; }
    .mobile-list { display: block; }
    .booked-row {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
      gap: 2px 8px;
      padding: 12px 16px;
    }
    .br-date {
      grid-column: 1; grid-row: 1;
      font-size: 10px; color: var(--text-muted);
    }
    .br-slot {
      grid-column: 1 / 3; grid-row: 2;
      font-size: 13px; font-weight: 500;
    }
    .br-name {
      grid-column: 1; grid-row: 3;
      font-size: 12px; color: var(--booked-text);
    }
    .br-time {
      grid-column: 2; grid-row: 3;
      font-size: 11px; color: var(--text-muted);
      text-align: right;
    }
  }
</style>
</head>
<body>

<div class="loading-bar" id="loading-bar"></div>
<div class="toast" id="toast"></div>

<div class="app">
  <header>
    <div>
      <div class="logo">Schedule</div>
      <h1>2026WRO王子：自習時間カレンダー</h1>
    </div>
  </header>

  <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:16px;">
    <div class="mode-tabs" style="margin-bottom:0">
      <button class="mode-tab" id="tab-edit" onclick="requestAdminMode()">✏️ 管理者</button>
      <button class="mode-tab active" id="tab-view" onclick="setMode('view')">📅 閲覧・予約</button>
      <button class="mode-tab" id="tab-booked" onclick="setMode('booked')">📋 予約一覧</button>
    </div>
    <div id="admin-badge" style="display:none">
      <span class="admin-badge" onclick="adminLogout()">🔓 管理者ログイン中　ログアウト</span>
    </div>
  </div>

  <div class="mode-banner view" id="mode-banner">
    <span id="mode-banner-icon">📅</span>
    <span id="mode-banner-text">閲覧・予約モード — 枠をクリックして予約や状況を確認できます</span>
  </div>

  <div id="calendar-area">
    <div class="desktop-calendar">
      <div class="cal-nav">
        <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
        <h2 id="month-label"></h2>
        <button class="nav-btn" onclick="changeMonth(1)">›</button>
      </div>
      <div class="calendar">
        <div class="cal-header" id="cal-header"></div>
        <div class="cal-body" id="cal-body"></div>
      </div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--available); border:1px solid var(--available-border)"></div>空き枠（予約なし）</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--booked); border:1px solid var(--booked-border)"></div>予約あり</div>
      </div>
    </div>
    <div class="mobile-list" id="mobile-list"></div>
  </div>

  <div id="booked-section" style="display:none; margin-top:28px">
    <h2 style="font-size:16px; font-weight:500; margin-bottom:16px">予約一覧</h2>
    <div class="booked-list" id="booked-list-body"></div>
  </div>
</div>

<!-- パスワードモーダル -->
<div class="overlay" id="pw-modal">
  <div class="modal pw-modal">
    <div class="lock-icon">🔐</div>
    <h3>管理者ログイン</h3>
    <p>パスワードを入力してください</p>
    <input type="password" class="pw-input" id="pw-input" placeholder="••••••••" />
    <div class="pw-error" id="pw-error"></div>
    <div class="btn-row" style="margin-top:16px">
      <button class="btn btn-secondary" onclick="closeModal('pw-modal')">キャンセル</button>
      <button class="btn btn-primary" onclick="submitPassword()">ログイン</button>
    </div>
    <span class="pw-set-link" onclick="showSetPassword()">パスワードを変更する</span>
  </div>
</div>

<!-- パスワード設定モーダル -->
<div class="overlay" id="pw-set-modal">
  <div class="modal pw-modal">
    <div class="lock-icon">🔑</div>
    <h3>パスワードを設定</h3>
    <p>新しいパスワードを入力してください</p>
    <input type="password" class="pw-input" id="pw-new-input" placeholder="新しいパスワード" style="margin-bottom:8px" />
    <input type="password" class="pw-input" id="pw-new-confirm" placeholder="確認（もう一度）" />
    <div class="pw-error" id="pw-set-error"></div>
    <div class="btn-row" style="margin-top:16px">
      <button class="btn btn-secondary" onclick="closeModal('pw-set-modal')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveNewPassword()">保存</button>
    </div>
  </div>
</div>

<!-- 管理者：日付クリックモーダル -->
<div class="overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-date" id="edit-modal-date"></div>
    <h3>空き枠を管理</h3>
    <ul class="slot-list" id="edit-slot-list"></ul>
    <div class="form-section">
      <label class="form-label">時間帯を追加（例：10:00〜11:00）</label>
      <input type="text" class="form-input" id="new-slot-input" placeholder="例：14:00〜15:00" />
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal('edit-modal')">閉じる</button>
      <button class="btn btn-primary" id="add-slot-btn" onclick="addSlot()">追加</button>
    </div>
  </div>
</div>

<!-- 閲覧者：日付モーダル -->
<div class="overlay" id="view-day-modal">
  <div class="modal">
    <div class="modal-date" id="view-day-modal-date"></div>
    <h3>この日の枠</h3>
    <ul class="slot-list-view" id="view-slot-list"></ul>
    <div class="btn-row" style="margin-top:8px">
      <button class="btn btn-secondary" onclick="closeModal('view-day-modal')">閉じる</button>
    </div>
  </div>
</div>

<div class="overlay" id="book-modal">

    <div class="booking-slot-info">

<!-- 予約編集モーダル（閲覧者用） -->
<div class="overlay" id="edit-booking-modal">
  <div class="modal">

    <h3>予約を編集・取り消し</h3>
    <div class="booking-slot-info">
      <div class="bsi-label">枠</div>
      <div class="bsi-value" id="edit-booking-slot-label"></div>
    </div>
    <div>
      <label class="form-label">お名前 <span style="color:var(--danger)">*</span></label>
      <input type="text" class="form-input" id="edit-booking-name-input" placeholder="例：山田 太郎" />
    </div>
    <div style="margin-top:12px">
      <label class="form-label">希望時間 <span style="color:var(--danger)">*</span></label>
      <input type="text" class="form-input" id="edit-booking-time-input" placeholder="例：10:30〜11:00、午後なら可" />
    </div>
    <div class="btn-row">
      <button class="btn btn-danger" style="flex:none; padding:10px 16px;" id="cancel-booking-btn" onclick="cancelBookingByUser()">予約を取り消す</button>
      <button class="btn btn-secondary" onclick="closeModal('edit-booking-modal')">閉じる</button>

<!-- 削除確認モーダル -->
<div class="overlay" id="delete-confirm-modal">
  <div class="modal pw-modal">
    <div class="lock-icon">🗑️</div>
    <h3>削除の確認</h3>
    <p id="delete-confirm-desc"></p>
    <div style="margin-top:4px; margin-bottom:16px">
      <label class="form-label" style="text-align:left; display:block; margin-bottom:6px;">パスワードを入力</label>
      <input type="password" class="pw-input" id="delete-pw-input" placeholder="••••••••" />
      <div class="pw-error" id="delete-pw-error"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal('delete-confirm-modal')">キャンセル</button>
      <button class="btn btn-danger" id="execute-delete-btn" onclick="executeDelete()">削除する</button>
    </div>
  </div>
</div>

<script>
// =====================================================
// ★ GASのウェブアプリURLをここに貼り付けてください ★
// =====================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzSI5zBf_fsGH7-Koeb-IjLTeTF_yqmboRN16td-FIwHnq4PsBZw-xHaSnOLTuXjyhD/exec';
// =====================================================

const DEFAULT_PASSWORD = 'admin1234';
function getPassword() { return localStorage.getItem('cal_password') || DEFAULT_PASSWORD; }

// ===== STATE =====
let mode = 'view';
let isAdminLoggedIn = false;
let currentYear, currentMonth;
let editingDate = null;
let viewingDate = null;
let bookingSlotRef = null;
let deleteAction = null;
let editBookingRef = null; // { slotId, bookingId }

// slots: { 'YYYY-MM-DD': [ { id, label, bookings:[{id,name,time}] } ] }
let slots = {};

const now = new Date();
currentYear = now.getFullYear();
currentMonth = now.getMonth();

// ===== API =====
function setLoading(on) {
  document.getElementById('loading-bar').classList.toggle('active', on);
}

function showToast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (isError ? ' error' : '') + ' show';
  setTimeout(() => el.classList.remove('show'), 2800);
}

async function apiGet() {
  setLoading(true);
  try {
    const res = await fetch(`${GAS_URL}?action=getSlots`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    slots = data;
  } catch (e) {
    showToast('データの取得に失敗しました', true);
    console.error(e);
  } finally {
    setLoading(false);
  }
}

async function apiPost(body) {
  setLoading(true);
  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    return data;
  } catch (e) {
    showToast('通信エラーが発生しました', true);
    console.error(e);
    return null;
  } finally {
    setLoading(false);
  }
}

async function refreshData() {
  await apiGet();
  renderCalendar();
  if (mode === 'booked') renderBookedList();
  if (editingDate) renderEditSlotList();
}

// ===== 初期ロード =====
(async () => {
  await apiGet();
  renderCalendar();
})();

// ===== モード別スタイル =====
const BANNER_MAP = {
  edit:   { cls: 'edit',   icon: '✏️', text: '管理者モード — 日付をクリックして空き枠を追加・編集できます' },
  view:   { cls: 'view',   icon: '📅', text: '閲覧・予約モード — 枠をクリックして予約や状況を確認できます' },
  booked: { cls: 'booked', icon: '📋', text: '予約一覧モード — 現在の予約をすべて確認できます' },
};
const BG_MAP = { edit: '#fff8f0', view: '#f0f7ff', booked: '#f3f0fa' };

function applyModeStyle(m) {
  document.body.style.background = BG_MAP[m];
  const b = BANNER_MAP[m];
  document.getElementById('mode-banner').className = 'mode-banner ' + b.cls;
  document.getElementById('mode-banner-icon').textContent = b.icon;
  document.getElementById('mode-banner-text').textContent = b.text;
}

// ===== PASSWORD =====
function requestAdminMode() {
  if (isAdminLoggedIn) { setMode('edit'); return; }
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-error').textContent = '';
  document.getElementById('pw-modal').classList.add('open');
  setTimeout(() => document.getElementById('pw-input').focus(), 100);
}

function submitPassword() {
  if (document.getElementById('pw-input').value === getPassword()) {
    isAdminLoggedIn = true;
    closeModal('pw-modal');
    document.getElementById('admin-badge').style.display = 'block';
    setMode('edit');
  } else {
    document.getElementById('pw-error').textContent = 'パスワードが違います';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

function adminLogout() {
  isAdminLoggedIn = false;
  document.getElementById('admin-badge').style.display = 'none';
  setMode('view');
}

function showSetPassword() {
  if (!isAdminLoggedIn) return;
  closeModal('pw-modal');
  document.getElementById('pw-new-input').value = '';
  document.getElementById('pw-new-confirm').value = '';
  document.getElementById('pw-set-error').textContent = '';
  document.getElementById('pw-set-modal').classList.add('open');
  setTimeout(() => document.getElementById('pw-new-input').focus(), 100);
}

function saveNewPassword() {
  const a = document.getElementById('pw-new-input').value;
  const b = document.getElementById('pw-new-confirm').value;
  if (a.length < 4) { document.getElementById('pw-set-error').textContent = '4文字以上で設定してください'; return; }
  if (a !== b)      { document.getElementById('pw-set-error').textContent = 'パスワードが一致しません'; return; }
  localStorage.setItem('cal_password', a);
  closeModal('pw-set-modal');
  showToast('パスワードを更新しました');
}

// ===== MODE =====
function setMode(m) {
  mode = m;
  ['edit','view','booked'].forEach((id, i) => {
    document.getElementById(['tab-edit','tab-view','tab-booked'][i]).classList.toggle('active', id === m);
  });
  const sec = document.getElementById('booked-section');
  const calArea = document.getElementById('calendar-area');
  if (m === 'booked') {
    sec.style.display = 'block';
    calArea.style.display = 'none';
    renderBookedList();
  } else {
    sec.style.display = 'none';
    calArea.style.display = 'block';
  }
  applyModeStyle(m);
  renderCalendar();
}

// ===== CALENDAR =====
function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
  renderCalendar();
}

function renderCalendar() {
  document.getElementById('cal-header').innerHTML =
    ['日','月','火','水','木','金','土'].map(d => `<div class="cal-dow">${d}</div>`).join('');
  document.getElementById('month-label').textContent = `${currentYear}年 ${currentMonth + 1}月`;

  const body = document.getElementById('cal-body');
  body.innerHTML = '';

  const firstDay    = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const prevDays    = new Date(currentYear, currentMonth, 0).getDate();
  const todayStr    = dateKey(now);

  const cells = [];
  for (let i = firstDay - 1; i >= 0; i--) cells.push({ day: prevDays - i, cur: false });
  for (let d = 1; d <= daysInMonth; d++)   cells.push({ day: d, cur: true });
  const rem = 42 - cells.length;
  for (let d = 1; d <= rem; d++) cells.push({ day: d, cur: false });

  cells.forEach(({ day, cur }) => {
    const el = document.createElement('div');
    el.className = 'cal-day';
    if (!cur) el.classList.add('other-month');

    const dk = cur ? dateKey(new Date(currentYear, currentMonth, day)) : null;
    const daySlots = dk ? (slots[dk] || []) : [];

    if (daySlots.length) el.classList.add('has-slots');
    if (dk === todayStr) el.classList.add('today');
    if (cur && mode === 'edit') { el.classList.add('editable'); el.onclick = () => openEditModal(dk); }
    if (cur && mode === 'view' && daySlots.length) { el.classList.add('clickable-view'); el.onclick = () => openViewDayModal(dk); }

    const numEl = document.createElement('div');
    numEl.className = 'day-num';
    numEl.textContent = day;
    el.appendChild(numEl);

    daySlots.forEach((slot) => {
      const hasB = slot.bookings && slot.bookings.length > 0;
      const chip = document.createElement('div');
      chip.className = 'slot-chip ' + (hasB ? 'has-bookings' : 'available');
      chip.textContent = hasB ? `${slot.label}（${slot.bookings.length}人）` : slot.label;
      chip.title = hasB ? slot.bookings.map(b => b.name + (b.time ? `（${b.time}）` : '')).join('、') : '空き枠';
      if (cur) chip.onclick = (e) => { e.stopPropagation(); mode === 'view' ? openViewDayModal(dk) : openEditModal(dk); };
      el.appendChild(chip);
    });

    body.appendChild(el);
  });

  renderMobileList();
}

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function formatDate(dk) {
  const [y,m,d] = dk.split('-');
  return `${y}年${parseInt(m)}月${parseInt(d)}日`;
}

// ===== MOBILE LIST =====
function renderMobileList() {
  const container = document.getElementById('mobile-list');
  if (!container) return;
  const monthKey = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const todayStr = dateKey(now);
  let html = '';
  let hasAny = false;

  for (let d = 1; d <= daysInMonth; d++) {
    const dk = `${monthKey}-${String(d).padStart(2,'0')}`;
    const daySlots = slots[dk];
    if (!daySlots || !daySlots.length) continue;
    hasAny = true;
    const isToday = dk === todayStr;
    const dow = ['日','月','火','水','木','金','土'][new Date(dk).getDay()];
    const totalBookings = daySlots.reduce((n, s) => n + (s.bookings||[]).length, 0);
    const countLabel = totalBookings > 0 ? `${totalBookings}人予約` : '';
    const editCls = mode === 'edit' ? ' edit-mode' : '';
    const slotItems = daySlots.map(s => {
      const hasB = s.bookings && s.bookings.length > 0;
      const cls = hasB ? 'has-bookings' : 'available';
      const badge = hasB ? `${s.bookings.length}人予約` : '空き';
      const onclick = mode === 'edit' ? `openEditModal('${dk}')` : `openViewDayModal('${dk}')`;
      return `<li class="mobile-slot-item ${cls}" onclick="${onclick}">
        <span class="mobile-slot-label">${s.label}</span>
        <span class="mobile-slot-badge">${badge}</span>
      </li>`;
    }).join('');
    html += `<div class="mobile-day-card">
      <div class="mobile-day-header${editCls}" onclick="toggleMobileDay(this)">
        <span class="mobile-day-date${isToday?' today':''}">${formatDate(dk)}（${dow}）</span>
        ${countLabel ? `<span class="mobile-day-count">${countLabel}</span>` : ''}
        <span class="mobile-day-arrow">›</span>
      </div>
      <ul class="mobile-slot-list" style="display:none">${slotItems}</ul>
    </div>`;
  }

  if (!hasAny) html = '<div style="text-align:center;padding:32px;color:var(--text-muted);font-size:14px;">この月に空き枠はありません</div>';
  container.innerHTML = html;
}

function toggleMobileDay(headerEl) {
  const list = headerEl.nextElementSibling;
  const arrow = headerEl.querySelector('.mobile-day-arrow');
  const isOpen = list.style.display !== 'none';
  list.style.display = isOpen ? 'none' : 'block';
  arrow.classList.toggle('open', !isOpen);
}

// ===== EDIT MODAL =====
function openEditModal(dk) {
  editingDate = dk;
  document.getElementById('edit-modal-date').textContent = formatDate(dk);
  document.getElementById('new-slot-input').value = '';
  renderEditSlotList();
  document.getElementById('edit-modal').classList.add('open');
}

function renderEditSlotList() {
  const list = document.getElementById('edit-slot-list');
  const daySlots = slots[editingDate] || [];
  if (!daySlots.length) {
    list.innerHTML = '<li style="color:var(--text-muted);font-size:13px;padding:4px 0">まだ枠がありません</li>';
    return;
  }
  list.innerHTML = daySlots.map((s, i) => {
    const hasB = s.bookings && s.bookings.length > 0;
    const headerCls = hasB ? 'has-bookings' : 'available';
    const countLabel = hasB ? `${s.bookings.length}人の予約` : '予約なし';
    const bookingRows = hasB ? s.bookings.map((b, bi) => `
      <li class="booking-entry">
        <div class="be-info">
          <div class="be-name">👤 ${b.name}</div>
          ${b.time ? `<div class="be-time">🕐 希望時間：${b.time}</div>` : ''}
        </div>
        <button class="be-delete" onclick="deleteBooking('${s.id}','${b.id}')" title="この予約を削除">✕</button>
      </li>`).join('') : '';
    return `<li class="edit-slot-item">
      <div class="edit-slot-header ${headerCls}">
        <span class="edit-slot-label">${s.label}</span>
        <span class="edit-slot-count">${countLabel}</span>
        <button class="slot-action-btn delete-slot-btn" onclick="deleteSlot('${s.id}')">枠削除</button>
      </div>
      ${hasB ? `<ul class="booking-entry-list">${bookingRows}</ul>` : ''}
    </li>`;
  }).join('');
}

async function addSlot() {
  const val = document.getElementById('new-slot-input').value.trim();
  if (!val) return;
  const btn = document.getElementById('add-slot-btn');
  btn.disabled = true;
  const result = await apiPost({ action: 'addSlot', date: editingDate, label: val });
  if (result) {
    showToast('枠を追加しました');
    document.getElementById('new-slot-input').value = '';
    await refreshData();
  }
  btn.disabled = false;
}

function deleteSlot(slotId) {
  const slot = Object.values(slots).flat().find(s => s.id === slotId);
  const label = slot ? slot.label : '枠';
  requestDelete(
    `枠「${label}」とその予約データをすべて削除しますか？`,
    async () => {
      const result = await apiPost({ action: 'deleteSlot', id: slotId });
      if (result) { showToast('枠を削除しました'); await refreshData(); }
    }
  );
}

function deleteBooking(slotId, bookingId) {
  const slot = Object.values(slots).flat().find(s => s.id === slotId);
  const booking = slot?.bookings.find(b => b.id === bookingId);
  const desc = booking ? `「${slot.label}」の予約者「${booking.name}」を削除しますか？` : '予約を削除しますか？';
  requestDelete(desc, async () => {
    const result = await apiPost({ action: 'deleteBooking', id: bookingId });
    if (result) { showToast('予約を削除しました'); await refreshData(); }
  });
}

// ===== VIEW DAY MODAL =====
function openViewDayModal(dk) {
  viewingDate = dk;
  document.getElementById('view-day-modal-date').textContent = formatDate(dk);
  renderViewSlotList();
  document.getElementById('view-day-modal').classList.add('open');
}

function renderViewSlotList() {
  const list = document.getElementById('view-slot-list');
  const daySlots = slots[viewingDate] || [];
  if (!daySlots.length) {
    list.innerHTML = '<li style="color:var(--text-muted);font-size:13px;padding:8px 0">枠がありません</li>';
    return;
  }
  list.innerHTML = daySlots.map((s, i) => {
    const hasB = s.bookings && s.bookings.length > 0;
    const headerCls = hasB ? 'has-bookings' : 'available';
    const statusText = hasB ? `👥 ${s.bookings.length}人が予約 — タップして追加` : '✅ 空き — タップして予約';
    const bookingRows = hasB ? `<ul class="view-booking-list">${s.bookings.map(b => `
      <li class="view-booking-row">
        <div class="vbr-info">
          <div class="vbr-name">👤 ${b.name}</div>
          ${b.time ? `<div class="vbr-time">🕐 ${b.time}</div>` : ''}
        </div>
        <div class="vbr-actions">
          <button class="vbr-btn vbr-edit-btn" onclick="openEditBookingModal(event,'${s.id}','${b.id}','${b.name.replace(/'/g,'\'')}','${b.time.replace(/'/g,'\'')}')">編集</button>
          <button class="vbr-btn vbr-cancel-btn" onclick="openEditBookingModal(event,'${s.id}','${b.id}','${b.name.replace(/'/g,'\'')}','${b.time.replace(/'/g,'\'')}')">取消</button>
        </div>
      </li>`).join('')}</ul>` : '';
    return `<li class="view-slot-card">
      <div class="view-slot-card-header ${headerCls}" onclick="openBookFromView(${i})">
        <span class="vsc-label">${s.label}</span>
        <span class="vsc-status">${statusText}</span>
      </div>
      ${bookingRows}
    </li>`;
  }).join('');
}

function openBookFromView(slotIdx) {
  const slot = (slots[viewingDate] || [])[slotIdx];
  if (!slot) return;
  bookingSlotRef = { dk: viewingDate, slotId: slot.id };
  document.getElementById('book-modal-date').textContent = formatDate(viewingDate);
  document.getElementById('book-slot-label').textContent = slot.label;
  document.getElementById('book-name-input').value = '';
  document.getElementById('book-time-input').value = '';
  closeModal('view-day-modal');
  document.getElementById('book-modal').classList.add('open');
  setTimeout(() => document.getElementById('book-name-input').focus(), 100);
}

function goBackToViewDay() {
  closeModal('book-modal');
  openViewDayModal(bookingSlotRef.dk);
}

// ===== BOOK MODAL =====
async function confirmBooking() {
  const name = document.getElementById('book-name-input').value.trim();
  if (!name) { document.getElementById('book-name-input').focus(); return; }
  const time = document.getElementById('book-time-input').value.trim();
  if (!time) { document.getElementById('book-time-input').focus(); return; }

  const btn = document.getElementById('confirm-booking-btn');
  btn.disabled = true;
  const result = await apiPost({
    action: 'addBooking',
    slot_id: bookingSlotRef.slotId,
    date: bookingSlotRef.dk,
    name,
    time
  });
  if (result) {
    showToast('予約しました！');
    closeModal('book-modal');
    await refreshData();
    setTimeout(() => openViewDayModal(bookingSlotRef.dk), 300);
  }
  btn.disabled = false;
}

// ===== BOOKED LIST =====
function renderBookedList() {
  const body = document.getElementById('booked-list-body');
  const entries = [];
  Object.entries(slots).forEach(([dk, daySlots]) => {
    daySlots.forEach(s => {
      (s.bookings || []).forEach(b => {
        entries.push({ dk, label: s.label, name: b.name, time: b.time });
      });
    });
  });
  entries.sort((a, b) => a.dk.localeCompare(b.dk));
  if (!entries.length) { body.innerHTML = '<div class="empty-state">予約はまだありません</div>'; return; }
  body.innerHTML = entries.map(e => `
    <div class="booked-row">
      <span class="br-date">${formatDate(e.dk)}</span>
      <span class="br-slot">${e.label}</span>
      <span class="br-name">${e.name}</span>
      <span class="br-time">${e.time || '—'}</span>
    </div>`).join('');
}


// ===== EDIT BOOKING (閲覧者) =====
function openEditBookingModal(e, slotId, bookingId, name, time) {
  e.stopPropagation();
  editBookingRef = { slotId, bookingId };

  // 枠のlabelと日付を探す
  let slotLabel = '', dk = '';
  Object.entries(slots).forEach(([d, daySlots]) => {
    daySlots.forEach(s => {
      if (s.id === slotId) { slotLabel = s.label; dk = d; }
    });
  });

  document.getElementById('edit-booking-modal-date').textContent = dk ? formatDate(dk) : '';
  document.getElementById('edit-booking-slot-label').textContent = slotLabel;
  document.getElementById('edit-booking-name-input').value = name;
  document.getElementById('edit-booking-time-input').value = time;
  document.getElementById('edit-booking-modal').classList.add('open');
  setTimeout(() => document.getElementById('edit-booking-name-input').focus(), 100);
}

async function updateBookingByUser() {
  const name = document.getElementById('edit-booking-name-input').value.trim();
  const time = document.getElementById('edit-booking-time-input').value.trim();
  if (!name) { document.getElementById('edit-booking-name-input').focus(); return; }
  if (!time) { document.getElementById('edit-booking-time-input').focus(); return; }

  const btn = document.getElementById('update-booking-btn');
  btn.disabled = true;
  const result = await apiPost({ action: 'updateBooking', id: editBookingRef.bookingId, name, time });
  if (result) {
    showToast('予約を更新しました');
    closeModal('edit-booking-modal');
    await refreshData();
    // 元の日付モーダルを再表示
    const dk = Object.keys(slots).find(d => slots[d].some(s => s.id === editBookingRef.slotId));
    if (dk) setTimeout(() => openViewDayModal(dk), 300);
  }
  btn.disabled = false;
}

async function cancelBookingByUser() {
  if (!confirm('この予約を取り消してもよいですか？')) return;
  const btn = document.getElementById('cancel-booking-btn');
  btn.disabled = true;
  const result = await apiPost({ action: 'deleteBooking', id: editBookingRef.bookingId });
  if (result) {
    showToast('予約を取り消しました');
    closeModal('edit-booking-modal');
    await refreshData();
    const dk = Object.keys(slots).find(d =>
      (slots[d] || []).some(s => s.id === editBookingRef.slotId)
    );
    if (dk) setTimeout(() => openViewDayModal(dk), 300);
  }
  btn.disabled = false;
}

// ===== DELETE CONFIRM =====
function requestDelete(desc, callback) {
  deleteAction = callback;
  document.getElementById('delete-confirm-desc').textContent = desc;
  document.getElementById('delete-pw-input').value = '';
  document.getElementById('delete-pw-error').textContent = '';
  closeModal('edit-modal');
  document.getElementById('delete-confirm-modal').classList.add('open');
  setTimeout(() => document.getElementById('delete-pw-input').focus(), 100);
}

async function executeDelete() {
  const val = document.getElementById('delete-pw-input').value;
  if (val !== getPassword()) {
    document.getElementById('delete-pw-error').textContent = 'パスワードが違います';
    document.getElementById('delete-pw-input').value = '';
    document.getElementById('delete-pw-input').focus();
    return;
  }
  const btn = document.getElementById('execute-delete-btn');
  btn.disabled = true;
  closeModal('delete-confirm-modal');
  if (deleteAction) { await deleteAction(); deleteAction = null; }
  if (editingDate) openEditModal(editingDate);
  btn.disabled = false;
}

// ===== MODAL HELPERS =====
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

document.getElementById('new-slot-input').addEventListener('keydown',  e => { if (e.key === 'Enter') addSlot(); });
document.getElementById('book-time-input').addEventListener('keydown', e => { if (e.key === 'Enter') confirmBooking(); });
document.getElementById('pw-input').addEventListener('keydown',        e => { if (e.key === 'Enter') submitPassword(); });
document.getElementById('pw-new-confirm').addEventListener('keydown',  e => { if (e.key === 'Enter') saveNewPassword(); });
document.getElementById('delete-pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') executeDelete(); });
document.getElementById('edit-booking-time-input').addEventListener('keydown', e => { if (e.key === 'Enter') updateBookingByUser(); });
</script>
</body>
